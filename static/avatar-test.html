<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Test</title>
  <link rel="stylesheet" href="avatar.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
    }
    #avatar { width: 200px; height: 200px; }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      border: 1px solid #5b9aff;
      background: transparent;
      color: #5b9aff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s, color 0.2s;
    }
    button:hover {
      background: #5b9aff;
      color: #0a0e17;
    }
    .state-label {
      font-size: 13px;
      color: #5b9aff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="avatar"></div>
  <div class="state-label" id="stateLabel">idle</div>
  <div class="controls">
    <button onclick="go('idle')">Idle</button>
    <button onclick="go('speaking')">Speak</button>
    <button onclick="go('thinking')">Think</button>
    <button onclick="go('listening')">Listen</button>
  </div>
  <script src="avatar.js"></script>
  <script>
    avatarInit(document.getElementById('avatar'));
    function go(state) {
      const label = document.getElementById('stateLabel');
      label.textContent = state;
      if (state === 'speaking') avatarSpeak();
      else if (state === 'thinking') avatarThink();
      else if (state === 'listening') avatarListen();
      else avatarIdle();
    }
  </script>
</body>
</html>
